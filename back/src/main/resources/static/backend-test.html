<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>백엔드 API 테스트</title>
<style>
  body { font-family: sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
  h2 { border-bottom: 2px solid #ddd; padding-bottom: 4px; margin-top: 32px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
  input { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 6px 14px; border: none; border-radius: 4px; background: #22c55e; color: white; cursor: pointer; }
  button:hover { background: #16a34a; }
  pre { background: #111; color: #0f0; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; min-height: 20px; }
  .label { font-size: 13px; color: #666; min-width: 70px; }
</style>
</head>
<body>
  <h1>백엔드 API 클릭 테스트</h1>
  <p>버튼을 누르면 <code>http://localhost:5173</code>으로 실제 요청을 보내고, 아래 결과창에 응답을 보여줍니다.</p>

  <h2>회원 (Member)</h2>
  <div class="row">
    <span class="label">아이디</span><input id="m-loginId" value="testuser" />
    <span class="label">비밀번호</span><input id="m-password" type="password" value="test1234" />
    <span class="label">이름</span><input id="m-name" value="테스트유저" />
  </div>
  <div class="row">
    <button onclick="memberList()">전체 회원 목록</button>
    <button onclick="signup()">회원가입</button>
    <button onclick="login()">로그인</button>
    <button onclick="logout()">로그아웃</button>
    <button onclick="me()">내 정보 (/me)</button>
  </div>

  <h2>게시판 (Board)</h2>
  <div class="row">
    <span class="label">id</span><input id="b-id" value="999003" style="width:80px" />
    <span class="label">제목</span><input id="b-title" value="테스트 영화" />
    <span class="label">내용</span><input id="b-overview" value="등록 테스트" />
  </div>
  <div class="row">
    <button onclick="boardList()">목록 조회</button>
    <button onclick="boardDetail()">상세 조회</button>
    <button onclick="boardAdd()">등록</button>
    <button onclick="boardEdit()">수정</button>
    <button onclick="boardDelete()">삭제</button>
  </div>

  <h2>결과</h2>
  <pre id="out">여기에 결과가 표시됩니다.</pre>

<script>
const BASE = 'http://localhost:8080';
const out = document.getElementById('out');

async function call(method, path, body) {
  out.textContent = `${method} ${path} 요청 중...`;
  try {
    const res = await fetch(BASE + path, {
      method,
      headers: body ? { 'Content-Type': 'application/json' } : undefined,
      credentials: 'include',
      body: body ? JSON.stringify(body) : undefined,
    });
    const text = await res.text();
    let pretty = text;
    try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch {}
    out.textContent = `${method} ${path}\n상태: ${res.status} ${res.statusText}\n\n${pretty || '(빈 응답)'}`;
  } catch (e) {
    out.textContent = `${method} ${path}\n네트워크 오류: ${e.message}`;
  }
}

const v = (id) => document.getElementById(id).value;

function memberList() {
  call('GET', '/api/members');
}
function signup() {
  call('POST', '/api/members/signup', { loginId: v('m-loginId'), password: v('m-password'), name: v('m-name') });
}
function login() {
  call('POST', '/api/members/login', { loginId: v('m-loginId'), password: v('m-password') });
}
function logout() {
  call('POST', '/api/members/logout');
}
function me() {
  call('GET', '/api/members/me');
}

function boardList() {
  call('GET', '/api/board');
}
function boardDetail() {
  call('GET', `/api/board/${v('b-id')}`);
}
function boardAdd() {
  call('POST', '/api/board/add', { id: Number(v('b-id')), title: v('b-title'), overview: v('b-overview') });
}
function boardEdit() {
  call('POST', `/api/board/edit/${v('b-id')}`, { id: Number(v('b-id')), title: v('b-title'), overview: v('b-overview') });
}
function boardDelete() {
  call('POST', `/api/board/delete/${v('b-id')}`);
}
</script>
</body>
</html>
