<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>로그인 - CineStats</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0b0d19;
        color: #ffffff;
        font-family: "Malgun Gothic", dotum, sans-serif;
        min-height: 100vh;
      }
      header.site-header {
        background-color: #121624;
        border-bottom: 1px solid #1f2438;
        padding: 16px 0;
      }
      .brand {
        font-weight: bold;
        font-size: 1.4rem;
        color: #ffffff;
      }
      .brand-sub {
        color: #7a8299;
        font-size: 0.85rem;
        margin-left: 8px;
      }
      .nav-links a {
        color: #a0a5b5;
        text-decoration: none;
        font-size: 0.95rem;
      }
      .nav-links a.active {
        color: #00c73c;
        font-weight: bold;
      }
      .auth-card {
        max-width: 380px;
        margin: 60px auto;
        background-color: #121624;
        border: 1px solid #1f2438;
        border-radius: 16px;
        padding: 32px;
      }
      .auth-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        background-color: #0b0d19;
        border-radius: 10px;
        padding: 4px;
      }
      .auth-tabs a {
        flex: 1;
        text-align: center;
        padding: 8px 0;
        border-radius: 8px;
        color: #a0a5b5;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: bold;
      }
      .auth-tabs a.active {
        background-color: #1f2438;
        color: #00c73c;
      }
      .form-control {
        background-color: #0b0d19;
        border: 1px solid #1f2438;
        color: #ffffff;
      }
      .form-control:focus {
        background-color: #0b0d19;
        border-color: #00c73c;
        color: #ffffff;
        box-shadow: none;
      }
      .btn-submit {
        background-color: #00c73c;
        border: none;
        font-weight: bold;
      }
      .btn-submit:hover {
        background-color: #00a832;
      }
      .error-text {
        color: #ff6b6b;
        font-size: 0.85rem;
      }
      .switch-text {
        color: #a0a5b5;
        font-size: 0.85rem;
        text-align: center;
      }
      .switch-text a {
        color: #00c73c;
        font-weight: bold;
        text-decoration: none;
      }
      #successBox {
        display: none;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container d-flex justify-content-between align-items-center">
        <div>
          <span class="brand">CineStats</span>
          <span class="brand-sub">영화 데이터 대시보드</span>
        </div>
        <div class="nav-links d-flex gap-3">
          <a th:href="@{/board/login(mode=login)}" th:classappend="${mode == 'login'} ? 'active' : ''">로그인</a>
          <a th:href="@{/board/login(mode=signup)}" th:classappend="${mode == 'signup'} ? 'active' : ''">회원가입</a>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="auth-card">
        <div class="auth-tabs">
          <a th:href="@{/board/login(mode=login)}" th:classappend="${mode == 'login'} ? 'active' : ''">로그인</a>
          <a th:href="@{/board/login(mode=signup)}" th:classappend="${mode == 'signup'} ? 'active' : ''">회원가입</a>
        </div>

        <div id="formBox">
          <form id="authForm">
            <div class="mb-3">
              <input type="text" id="loginId" class="form-control" placeholder="아이디" required />
            </div>
            <div class="mb-3" id="nameField" th:style="${mode == 'signup'} ? '' : 'display:none'">
              <input type="text" id="name" class="form-control" placeholder="이름" />
            </div>
            <div class="mb-3">
              <input type="password" id="password" class="form-control" placeholder="비밀번호" required />
            </div>
            <p class="error-text mb-2" id="errorText"></p>
            <button type="submit" class="btn btn-submit w-100 text-white mb-3" id="submitBtn">
              <span th:text="${mode == 'signup'} ? '회원가입' : '로그인'">로그인</span>
            </button>
          </form>

          <p class="switch-text" th:if="${mode == 'login'}">
            계정이 없으신가요? <a th:href="@{/board/login(mode=signup)}">회원가입</a>
          </p>
          <p class="switch-text" th:if="${mode == 'signup'}">
            이미 계정이 있으신가요? <a th:href="@{/board/login(mode=login)}">로그인</a>
          </p>
        </div>

        <div id="successBox" class="text-center">
          <p class="mb-3"><span id="welcomeName"></span>님, 환영합니다.</p>
          <button class="btn btn-outline-light w-100" id="logoutBtn">로그아웃</button>
        </div>
      </div>
    </div>

    <script th:inline="javascript">
      const mode = /*[[${mode}]]*/ 'login';
      const form = document.getElementById('authForm');
      const errorText = document.getElementById('errorText');
      const formBox = document.getElementById('formBox');
      const successBox = document.getElementById('successBox');
      const welcomeName = document.getElementById('welcomeName');

      function showLoggedIn(member) {
        formBox.style.display = 'none';
        successBox.style.display = 'block';
        welcomeName.textContent = member.name;
      }

      fetch('/api/members/me', { credentials: 'include' })
        .then((res) => (res.ok ? res.json() : null))
        .then((member) => {
          if (member) showLoggedIn(member);
        });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorText.textContent = '';

        const loginId = document.getElementById('loginId').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value;

        try {
          if (mode === 'signup') {
            const signupRes = await fetch('/api/members/signup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({ loginId, password, name }),
            });
            if (!signupRes.ok) {
              const err = await signupRes.json();
              throw new Error(err.message || '회원가입에 실패했습니다.');
            }
          }

          const loginRes = await fetch('/api/members/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ loginId, password }),
          });
          if (!loginRes.ok) {
            const err = await loginRes.json();
            throw new Error(err.message || '로그인에 실패했습니다.');
          }
          const member = await loginRes.json();
          showLoggedIn(member);
        } catch (err) {
          errorText.textContent = err.message;
        }
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/members/logout', { method: 'POST', credentials: 'include' });
        location.reload();
      });
    </script>
  </body>
</html>
