<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영화 데이터 차트 예시</title>

  <!-- Chart.js 불러오기 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    body { font-family: "Malgun Gothic", sans-serif; max-width: 900px;
           margin: 0 auto; padding: 24px; color: #222; }
    h1 { font-size: 20px; }
    .desc { color: #666; font-size: 14px; }
    .chart-box { margin: 28px 0; padding: 16px 20px;
                 border: 1px solid #e5e5e5; border-radius: 12px; }
    .chart-box h2 { font-size: 16px; margin: 0 0 12px; }
    .canvas-wrap { height: 420px; }
    #error { color: #c0392b; font-size: 14px; }
  </style>
</head>
<body>
  <h1>영화 데이터 차트 예시</h1>
  <p class="desc">데이터팀이 만든 <code>chart_data.json</code>을 불러와 Chart.js로 그립니다.</p>

  <!-- 차트가 그려질 영역 -->
  <div class="chart-box">
    <h2 id="title1">박스오피스</h2>
    <div class="canvas-wrap"><canvas id="boxChart"></canvas></div>
  </div>

  <div class="chart-box">
    <h2 id="title2">장르 분포</h2>
    <div class="canvas-wrap"><canvas id="genreChart"></canvas></div>
  </div>

  <p id="error"></p>

  <script>
    // chart_data.json을 불러와서 두 차트를 그리는 함수
    async function loadAndDraw() {
      try {
        // ① 데이터팀이 만든 JSON 불러오기
        const res = await fetch("chart_data.json");
        if (!res.ok) throw new Error("chart_data.json을 못 찾음 (status " + res.status + ")");
        const data = await res.json();

        // ② 박스오피스 — 가로 막대 (indexAxis: 'y')
        const box = data.boxofficeAudience;
        document.getElementById("title1").textContent = box.title;
        new Chart(document.getElementById("boxChart"), {
          type: "bar",
          data: {
            labels: box.labels,                 // ← JSON의 labels 그대로
            datasets: [{
              label: "관객수",
              data: box.values,                 // ← JSON의 values 그대로
              backgroundColor: "#1D9E75",
              borderRadius: 3
            }]
          },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { title: { display: true, text: "관객수 (명)" } } }
          }
        });

        // ③ 장르 분포 — 세로 막대
        const genre = data.genreDistribution;
        document.getElementById("title2").textContent = genre.title;
        new Chart(document.getElementById("genreChart"), {
          type: "bar",
          data: {
            labels: genre.labels,
            datasets: [{
              label: "영화 수",
              data: genre.values,
              backgroundColor: "#378ADD",
              borderRadius: 3
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, title: { display: true, text: "영화 수" } } }
          }
        });

      } catch (e) {
        // 파일을 더블클릭으로 열면 fetch가 막혀서 여기로 옴
        document.getElementById("error").textContent =
          "⚠️ " + e.message + " — HTML을 더블클릭하지 말고 로컬 서버로 여세요 (아래 설명 참고).";
      }
    }

    loadAndDraw();
  </script>
</body>
</html>
